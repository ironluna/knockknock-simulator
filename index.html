<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天模拟器 - Knock Knock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0d0d0d;
            --bg-panel: #1a1a1a;
            --bg-chat: #111111;
            --yellow: #f5d735;
            --yellow-dark: #e6c820;
            --blue: #3a7df2;
            --blue-light: #4a8df8;
            --white: #ffffff;
            --gray-light: #aaaaaa;
            --gray-mid: #555555;
            --gray-dark: #2a2a2a;
            --red: #e84040;
            --contact-bg: #2a2a2c;
            --contact-active: #3a3a3c;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--white);
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            width: 900px;
            max-width: 100%;
            background: var(--bg-panel);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .control-panel h2 {
            font-size: 16px;
            color: var(--yellow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 11px;
            color: var(--gray-light);
            font-weight: 500;
        }

        .control-group input[type="text"],
        .control-group input[type="number"],
        .control-group input[type="date"],
        .control-group select {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            border-radius: 8px;
            color: var(--white);
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input:focus,
        .control-group select:focus {
            border-color: var(--yellow);
        }

        .file-upload-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-upload-group .hint {
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-yellow {
            background: var(--yellow);
            color: #000;
        }

        .btn-yellow:hover {
            background: var(--yellow-dark);
            transform: translateY(-1px);
        }

        .btn-blue {
            background: var(--blue);
            color: var(--white);
        }

        .btn-blue:hover {
            background: var(--blue-light);
            transform: translateY(-1px);
        }

        .btn-red {
            background: var(--red);
            color: var(--white);
        }

        .btn-red:hover {
            background: #d63030;
            transform: translateY(-1px);
        }

        .btn-gray {
            background: var(--gray-dark);
            color: var(--gray-light);
            border: 1px solid var(--gray-mid);
        }

        .btn-gray:hover {
            background: var(--gray-mid);
            color: var(--white);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* ===== Sections ===== */
        .section-title {
            font-size: 13px;
            color: var(--gray-light);
            margin: 16px 0 10px 0;
            padding-top: 12px;
            border-top: 1px solid var(--gray-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        /* ===== 联系人管理 ===== */
        .contacts-manager {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .contact-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            border-radius: 20px;
            padding: 4px 12px 4px 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .contact-tag.active {
            border-color: var(--yellow);
            background: rgba(245,215,53,0.1);
        }

        .contact-tag img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-tag .avatar-placeholder {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--gray-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .contact-tag .remove-contact {
            margin-left: 4px;
            color: var(--red);
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            line-height: 1;
        }

        /* ===== Toggle Switch ===== */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--gray-light);
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--gray-mid);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--yellow);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(16px);
        }

        /* ===== 主应用容器 ===== */
        .app-container {
            width: 900px;
            max-width: 100%;
            height: 640px;
            background: #1c1c1e;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        /* ===== 顶部 Knock Knock 区域 ===== */
        .top-bar {
            background: var(--bg-dark);
            border-radius: 18px;
            margin: 8px 8px 0 8px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 2;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar-logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--yellow);
            letter-spacing: -0.5px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
        }

        .top-bar-time {
            font-size: 13px;
            color: var(--gray-light);
            font-weight: 500;
        }

        /* ===== 主内容区 ===== */
        .main-content {
            display: flex;
            flex: 1;
            padding: 8px;
            gap: 8px;
            min-height: 0;
        }

        /* ===== 左侧对话列表 ===== */
        .sidebar {
            width: 200px;
            min-width: 200px;
            background: var(--bg-dark);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 14px 10px 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-light);
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-list::-webkit-scrollbar {
            width: 3px;
        }

        .sidebar-list::-webkit-scrollbar-thumb {
            background: var(--gray-mid);
            border-radius: 3px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--contact-bg);
            position: relative;
        }

        .sidebar-item:hover {
            background: var(--contact-active);
        }

        .sidebar-item.active {
            background: var(--contact-active);
            border: 1px solid var(--gray-mid);
        }

        .sidebar-item .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .sidebar-item .sidebar-avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            color: var(--gray-light);
        }

        .sidebar-item-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item-preview {
            font-size: 11px;
            color: var(--gray-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* 未读标记 - 右上角红色倒三角+感叹号 */
        .unread-badge {
            position: absolute;
            top: -1px;
            right: 4px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 16px solid var(--red);
            display: none;
        }

        .unread-badge.show {
            display: block;
        }

        .unread-badge::after {
            content: '!';
            position: absolute;
            top: -15px;
            left: -2px;
            font-size: 9px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        /* ===== 右侧对话区域 ===== */
        .chat-area {
            flex: 1;
            background: var(--bg-dark);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* 对话区域顶部 - 联系人名称 */
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .chat-header-icon {
            font-size: 16px;
        }

        .chat-header-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
        }

        .chat-header-empty {
            color: var(--gray-mid);
            font-size: 13px;
            font-style: italic;
        }

        /* ===== 聊天消息区域 ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gray-mid);
            border-radius: 4px;
        }

        /* 时间/阶段分隔 */
        .time-divider {
            text-align: center;
            padding: 10px 0;
        }

        .time-divider span {
            font-size: 11px;
            color: var(--gray-light);
            background: rgba(80,80,80,0.3);
            padding: 3px 14px;
            border-radius: 10px;
        }

        /* 消息行 */
        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 80%;
        }

        .msg-row.other {
            align-self: flex-start;
            flex-direction: row;
        }

        .msg-row.self {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* 合并消息时隐藏头像占位 */
        .msg-row.merged .msg-avatar-wrap {
            visibility: hidden;
        }

        .msg-row.merged .msg-sender-name {
            display: none;
        }

        .msg-avatar-wrap {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }

        .msg-avatar-placeholder {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--gray-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gray-light);
        }

        .msg-content-wrap {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .msg-sender-name {
            font-size: 11px;
            color: var(--gray-light);
            margin-bottom: 1px;
        }

        .msg-row.self .msg-sender-name {
            text-align: right;
        }

        .msg-bubble {
            padding: 9px 14px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.45;
            word-break: break-word;
            max-width: 100%;
        }

        .msg-row.other .msg-bubble {
            background: var(--white);
            color: #000;
            border-top-left-radius: 6px;
        }

        .msg-row.self .msg-bubble {
            background: var(--blue);
            color: var(--white);
            border-top-right-radius: 6px;
        }

        /* 合并时调整气泡圆角 */
        .msg-row.merged.other .msg-bubble {
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
        }

        .msg-row.merged.self .msg-bubble {
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--gray-mid);
            margin-top: 1px;
        }

        .msg-row.self .msg-time {
            text-align: right;
        }

        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .new-message-animate {
            animation: msgFadeIn 0.35s ease-out;
        }

        /* ===== 底部输入区 ===== */
        .chat-input-bar {
            padding: 10px 14px;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .sender-toggle {
            display: flex;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
        }

        .sender-toggle-btn {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid var(--gray-mid);
            background: var(--gray-dark);
            color: var(--gray-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sender-toggle-btn:first-child {
            border-radius: 8px 0 0 8px;
            border-right: none;
        }

        .sender-toggle-btn:last-child {
            border-radius: 0 8px 8px 0;
        }

        .sender-toggle-btn.active-other {
            background: var(--white);
            color: #000;
            border-color: var(--white);
        }

        .sender-toggle-btn.active-self {
            background: var(--blue);
            color: var(--white);
            border-color: var(--blue);
        }

        .chat-input-bar input[type="text"] {
            flex: 1;
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            border-radius: 10px;
            color: var(--white);
            padding: 9px 14px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-bar input[type="text"]:focus {
            border-color: var(--yellow);
        }

        .chat-input-bar input[type="text"]::placeholder {
            color: var(--gray-mid);
        }

        .chat-input-bar .btn {
            flex-shrink: 0;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray-mid);
            gap: 8px;
        }

        .empty-state .icon {
            font-size: 40px;
            opacity: 0.4;
        }

        .empty-state .text {
            font-size: 13px;
        }

        /* ===== 辅助 ===== */
        .inline-flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .avatar-preview {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gray-mid);
        }

        .divider {
            height: 1px;
            background: var(--gray-dark);
            margin: 6px 0;
        }

        .hint {
            font-size: 10px;
            color: var(--gray-mid);
            font-style: italic;
        }

        /* 操作区小间距 */
        .ops-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 时间设置区域 */
        .time-settings {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .time-settings select,
        .time-settings input {
            width: auto;
        }

        /* 消息阶段按钮 */
        .stage-btn {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 6px;
            border: 1px dashed var(--gray-mid);
            background: transparent;
            color: var(--gray-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .stage-btn:hover {
            border-color: var(--yellow);
            color: var(--yellow);
        }
    </style>
</head>
<body>

<!-- ===== 控制面板 ===== -->
<div class="control-panel">
    <h2>⚙️ 聊天模拟器控制台</h2>

    <!-- 联系人管理 -->
    <div class="section-title">👥 联系人管理</div>
    <div class="control-row">
        <div class="control-group">
            <label>联系人名称</label>
            <input type="text" id="newContactName" placeholder="输入名称" style="width:120px;">
        </div>
        <div class="control-group">
            <label>联系人头像</label>
            <div class="file-upload-group">
                <input type="file" id="newContactAvatarFile" accept="image/*" style="display:none;">
                <button class="btn btn-gray btn-small" onclick="document.getElementById('newContactAvatarFile').click()">选择文件</button>
                <span id="newContactAvatarName" class="hint">未选择</span>
            </div>
        </div>
        <button class="btn btn-yellow" onclick="addContact()">＋ 添加联系人</button>
    </div>
    <div class="contacts-manager" id="contactsManager">
        <!-- 联系人标签 -->
    </div>

    <!-- 我的设置 -->
    <div class="section-title">🙂 "我"的设置</div>
    <div class="control-row">
        <div class="control-group">
            <label>我的名称</label>
            <input type="text" id="myName" value="我" style="width:100px;" oninput="updateMyProfile()">
        </div>
        <div class="control-group">
            <label>我的头像</label>
            <div class="file-upload-group">
                <input type="file" id="myAvatarFile" accept="image/*" style="display:none;">
                <button class="btn btn-gray btn-small" onclick="document.getElementById('myAvatarFile').click()">选择文件</button>
                <span id="myAvatarName" class="hint">未选择</span>
            </div>
        </div>
        <div class="control-group" style="justify-content:flex-end;">
            <div id="myAvatarPreview" class="inline-flex"></div>
        </div>
    </div>

    <!-- 消息设置 -->
    <div class="section-title">💬 消息设置</div>
    <div class="control-row">
        <div class="toggle-row">
            <div class="toggle-switch" id="toggleMerge" onclick="toggleMergeMode()"></div>
            <span>合并连续消息</span>
        </div>
        <div class="control-group" style="margin-left: 10px;">
            <label>合并条数</label>
            <input type="number" id="mergeCount" value="99" min="2" style="width:70px;" onchange="if(currentContactId!==null)renderChat()">
        </div>
    </div>

    <!-- 未读标记设置 -->
    <div class="section-title">🔴 未读标记设置（当前选中联系人）</div>
    <div class="control-row">
        <div class="toggle-row">
            <div class="toggle-switch" id="toggleUnread" onclick="toggleUnread()"></div>
            <span>显示未读标记</span>
        </div>
    </div>

    <!-- 时间 & 阶段插入 -->
    <div class="section-title">🕐 插入时间戳 / 消息阶段</div>
    <div class="control-row time-settings">
        <div class="control-group">
            <label>日期模式</label>
            <select id="dateMode" style="width:100px;" onchange="updateDateUI()">
                <option value="none">不显示日期</option>
                <option value="today">今天</option>
                <option value="yesterday">昨天</option>
                <option value="custom">自定义日期</option>
            </select>
        </div>
        <div class="control-group" id="customDateGroup" style="display:none;">
            <label>选择日期</label>
            <input type="date" id="customDate" style="width:140px;">
        </div>
        <div class="control-group">
            <label>时间 (HH:MM)</label>
            <input type="text" id="timeInput" placeholder="14:30" style="width:80px;">
        </div>
        <button class="btn btn-gray btn-small" onclick="insertTimestamp()">插入时间戳</button>
        <div style="width:1px;height:28px;background:var(--gray-mid);margin:0 4px;"></div>
        <div class="control-group">
            <label>消息阶段</label>
            <select id="stageSelect" style="width:150px;">
                <option value="—历史消息—">—历史消息—</option>
                <option value="—以上为最新—">—以上为最新—</option>
                <option value="custom">自定义内容...</option>
            </select>
        </div>
        <div class="control-group" id="customStageGroup" style="display:none;">
            <label>自定义阶段文字</label>
            <input type="text" id="customStageText" placeholder="自定义文字" style="width:130px;">
        </div>
        <button class="btn btn-gray btn-small" onclick="insertStage()">插入阶段</button>
    </div>

    <!-- 操作 -->
    <div class="section-title">🛠️ 操作</div>
    <div class="ops-row">
        <button class="btn btn-red btn-small" onclick="clearCurrentChat()">清空当前对话</button>
        <button class="btn btn-red btn-small" onclick="deleteLastMsg()">撤回最后一条</button>
        <button class="btn btn-gray btn-small" onclick="exportScreenshot()">📷 导出截图提示</button>
    </div>
</div>

<!-- ===== 聊天主界面 ===== -->
<div class="app-container" id="appContainer">
    <!-- 顶部 Knock Knock 区域 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="top-bar-logo">knock knock</div>
        </div>
        <div class="top-bar-right">
            <div class="status-dot"></div>
            <div class="top-bar-time" id="topBarTime">12:00</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- 左侧对话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">对话列表</div>
            <div class="sidebar-list" id="sidebarList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 右侧对话区域 -->
        <div class="chat-area">
            <!-- 对话顶部 - 联系人名 -->
            <div class="chat-header" id="chatHeader">
                <span class="chat-header-empty">← 请添加联系人并选择对话</span>
            </div>

            <!-- 聊天消息 -->
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="icon">💬</div>
                    <div class="text">添加联系人开始模拟对话</div>
                </div>
            </div>

            <!-- 底部输入 -->
            <div class="chat-input-bar">
                <div class="sender-toggle">
                    <button class="sender-toggle-btn active-other" id="toggleOther" onclick="setSender('other')">对方</button>
                    <button class="sender-toggle-btn" id="toggleSelf" onclick="setSender('self')">我</button>
                </div>
                <input type="text" id="msgInput" placeholder="输入对方发送的消息..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="btn btn-yellow" onclick="sendMsg()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== 数据结构 =====
    let contacts = [];          // {id, name, avatar, unread, messages:[]}
    let currentContactId = null;
    let currentSender = 'other'; // 'other' | 'self'
    let mergeMode = false;
    let myProfile = { name: '我', avatar: '' };
    let contactIdCounter = 0;

    // Staged avatars for file upload
    let stagedContactAvatar = '';
    let stagedMyAvatar = '';

    // ===== 初始化 =====
    function init() {
        updateTopBarTime();
        setInterval(updateTopBarTime, 60000);
        updateMyProfile();
        document.getElementById('stageSelect').addEventListener('change', function() {
            document.getElementById('customStageGroup').style.display = this.value === 'custom' ? '' : 'none';
        });

        // Avatar file input listeners
        document.getElementById('newContactAvatarFile').addEventListener('change', (e) => handleFileSelect(e, 'contact'));
        document.getElementById('myAvatarFile').addEventListener('change', (e) => handleFileSelect(e, 'my'));
    }

    function updateTopBarTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('topBarTime').textContent = h + ':' + m;
    }

    // Handle file upload and create data URL
    function handleFileSelect(event, type) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            if (type === 'contact') {
                stagedContactAvatar = e.target.result;
                document.getElementById('newContactAvatarName').textContent = file.name;
            } else if (type === 'my') {
                stagedMyAvatar = e.target.result;
                document.getElementById('myAvatarName').textContent = file.name;
                updateMyProfile();
            }
        };
        reader.readAsDataURL(file);
    }

    // ===== 日期模式切换 =====
    function updateDateUI() {
        const mode = document.getElementById('dateMode').value;
        document.getElementById('customDateGroup').style.display = mode === 'custom' ? '' : 'none';
    }

    // ===== 我的设置 =====
    function updateMyProfile() {
        myProfile.name = document.getElementById('myName').value || '我';
        if (stagedMyAvatar) {
            myProfile.avatar = stagedMyAvatar;
        }
        const preview = document.getElementById('myAvatarPreview');
        if (myProfile.avatar) {
            preview.innerHTML = `<img src="${myProfile.avatar}" class="avatar-preview" onerror="this.style.display='none'">`;
        } else {
            preview.innerHTML = '';
        }
        renderSidebar();
        if (currentContactId !== null) renderChat();
    }

    // ===== 联系人管理 =====
    function addContact() {
        const name = document.getElementById('newContactName').value.trim();
        if (!name) { alert('请输入联系人名称'); return; }

        const avatar = stagedContactAvatar;
        const id = ++contactIdCounter;
        contacts.push({ id, name, avatar, unread: false, messages: [] });

        // Reset inputs
        document.getElementById('newContactName').value = '';
        document.getElementById('newContactAvatarFile').value = '';
        document.getElementById('newContactAvatarName').textContent = '未选择';
        stagedContactAvatar = '';

        renderContactsManager();
        renderSidebar();
        selectContact(id);
    }

    function removeContact(id) {
        if (!confirm('删除此联系人及其所有消息？')) return;
        contacts = contacts.filter(c => c.id !== id);
        if (currentContactId === id) {
            currentContactId = contacts.length > 0 ? contacts[0].id : null;
            if (currentContactId) {
                selectContact(currentContactId);
            } else {
                currentContactId = null;
                renderContactsManager();
                renderSidebar();
                renderChat();
                updateChatHeader();
                updateUnreadToggle();
            }
        } else {
            renderContactsManager();
            renderSidebar();
        }
    }

    function selectContact(id) {
        currentContactId = id;
        renderContactsManager();
        renderSidebar();
        renderChat();
        updateChatHeader();
        updateUnreadToggle();
        updatePlaceholder();
    }

    function renderContactsManager() {
        const container = document.getElementById('contactsManager');
        container.innerHTML = '';
        contacts.forEach(c => {
            const tag = document.createElement('div');
            tag.className = 'contact-tag' + (c.id === currentContactId ? ' active' : '');
            tag.innerHTML = `
                ${c.avatar ? `<img src="${c.avatar}" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>👤</div>'">` : '<div class="avatar-placeholder">👤</div>'}
                <span>${c.name}</span>
                <span class="remove-contact" onclick="event.stopPropagation();removeContact(${c.id})">×</span>
            `;
            tag.onclick = () => selectContact(c.id);
            container.appendChild(tag);
        });
    }

    // ===== 侧边栏 =====
    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = '';
        if (contacts.length === 0) {
            list.innerHTML = '<div style="padding:20px 10px;text-align:center;color:var(--gray-mid);font-size:12px;">暂无联系人<br>请在上方添加</div>';
            return;
        }
        contacts.forEach(c => {
            const item = document.createElement('div');
            item.className = 'sidebar-item' + (c.id === currentContactId ? ' active' : '');
            const lastMsg = c.messages.filter(m => m.type === 'msg').pop();
            const preview = lastMsg ? (lastMsg.sender === 'self' ? myProfile.name + ': ' : '') + lastMsg.text : '暂无消息';
            item.innerHTML = `
                ${c.avatar ? `<img class="sidebar-avatar" src="${c.avatar}" onerror="this.outerHTML='<div class=\\'sidebar-avatar-placeholder\\'>👤</div>'">` : '<div class="sidebar-avatar-placeholder">👤</div>'}
                <div class="sidebar-item-info">
                    <div class="sidebar-item-name">${c.name}</div>
                    <div class="sidebar-item-preview">${preview}</div>
                </div>
                <div class="unread-badge ${c.unread ? 'show' : ''}"></div>
            `;
            item.onclick = () => selectContact(c.id);
            list.appendChild(item);
        });
    }

    // ===== 对话区域顶部 =====
    function updateChatHeader() {
        const header = document.getElementById('chatHeader');
        const contact = contacts.find(c => c.id === currentContactId);
        if (contact) {
            header.innerHTML = `<span class="chat-header-icon">💬</span><span class="chat-header-name">${contact.name}</span>`;
        } else {
            header.innerHTML = `<span class="chat-header-empty">← 请添加联系人并选择对话</span>`;
        }
    }

    // ===== 未读标记 =====
    function toggleUnread() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        contact.unread = !contact.unread;
        updateUnreadToggle();
        renderSidebar();
    }

    function updateUnreadToggle() {
        const toggle = document.getElementById('toggleUnread');
        const contact = contacts.find(c => c.id === currentContactId);
        if (contact && contact.unread) {
            toggle.classList.add('active');
        } else {
            toggle.classList.remove('active');
        }
    }

    // ===== 合并模式 =====
    function toggleMergeMode() {
        mergeMode = !mergeMode;
        const toggle = document.getElementById('toggleMerge');
        toggle.classList.toggle('active', mergeMode);
        if (currentContactId !== null) renderChat();
    }

    // ===== 发送者切换 =====
    function setSender(sender) {
        currentSender = sender;
        const btnOther = document.getElementById('toggleOther');
        const btnSelf = document.getElementById('toggleSelf');
        btnOther.className = 'sender-toggle-btn' + (sender === 'other' ? ' active-other' : '');
        btnSelf.className = 'sender-toggle-btn' + (sender === 'self' ? ' active-self' : '');
        updatePlaceholder();
    }

    function updatePlaceholder() {
        const input = document.getElementById('msgInput');
        const contact = contacts.find(c => c.id === currentContactId);
        const otherName = contact ? contact.name : '对方';
        if (currentSender === 'other') {
            input.placeholder = `输入${otherName}发送的消息...`;
        } else {
            input.placeholder = `输入我发送的消息...`;
        }
    }

    // ===== 通用添加消息 =====
    function addNewMessage(msgObject) {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) {
            alert('请先选择联系人');
            return false;
        }
        contact.messages.push(msgObject);
        renderChat(true);
        renderSidebar();
        return true;
    }

    // ===== 发送消息 =====
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        if (addNewMessage({ type: 'msg', sender: currentSender, text: text, time: new Date() })) {
            input.value = '';
        }
    }

    // ===== 插入时间戳 =====
    function insertTimestamp() {
        const mode = document.getElementById('dateMode').value;
        const timeStr = document.getElementById('timeInput').value.trim();
        let display = '';
        if (mode === 'today') {
            display = '今天';
        } else if (mode === 'yesterday') {
            display = '昨天';
        } else if (mode === 'custom') {
            const d = document.getElementById('customDate').value;
            if (d) {
                const parts = d.split('-');
                display = `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
            }
        }
        if (timeStr) {
            display = display ? display + ' ' + timeStr : timeStr;
        }
        if (!display) { alert('请设置日期或时间'); return; }
        addNewMessage({ type: 'time', text: display });
    }

    // ===== 插入阶段 =====
    function insertStage() {
        const sel = document.getElementById('stageSelect').value;
        let text = sel;
        if (sel === 'custom') {
            text = document.getElementById('customStageText').value.trim();
            if (!text) { alert('请输入自定义阶段文字'); return; }
        }
        addNewMessage({ type: 'stage', text: text });
    }

    // ===== 渲染聊天 =====
    function renderChat(isNewMessage = false) {
        const container = document.getElementById('chatMessages');
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) {
            container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div class="text">添加联系人开始模拟对话</div></div>';
            return;
        }
        if (contact.messages.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div class="text">开始发送消息吧</div></div>';
            return;
        }

        container.innerHTML = '';
        const msgs = contact.messages;
        const mergeCount = parseInt(document.getElementById('mergeCount').value) || 999;

        for (let i = 0; i < msgs.length; i++) {
            const msg = msgs[i];
            const element = document.createElement('div');

            if (msg.type === 'time' || msg.type === 'stage') {
                element.className = 'time-divider';
                element.innerHTML = `<span>${escapeHtml(msg.text)}</span>`;
                container.appendChild(element);
                continue;
            }

            // Merge logic: count how many consecutive same-sender msgs before this one
            let isMerged = false;
            if (mergeMode && i > 0 && msg.type === 'msg') {
                let sequencePosition = 1;
                for (let j = i - 1; j >= 0; j--) {
                    if (msgs[j].type !== 'msg' || msgs[j].sender !== msg.sender) {
                        break;
                    }
                    sequencePosition++;
                }
                if (sequencePosition > 1 && sequencePosition <= mergeCount) {
                    isMerged = true;
                }
            }

            const senderClass = msg.sender === 'self' ? 'self' : 'other';
            element.className = `msg-row ${senderClass}${isMerged ? ' merged' : ''}`;

            let avatarHtml = '';
            let nameHtml = '';
            const senderName = msg.sender === 'self' ? myProfile.name : contact.name;
            const senderAvatar = msg.sender === 'self' ? myProfile.avatar : contact.avatar;
            const senderPlaceholder = msg.sender === 'self' ? '😊' : '👤';

            if (senderAvatar) {
                avatarHtml = `<div class="msg-avatar-wrap"><img class="msg-avatar" src="${senderAvatar}" onerror="this.outerHTML='<div class=\\'msg-avatar-placeholder\\'>${senderPlaceholder}</div>'"></div>`;
            } else {
                avatarHtml = `<div class="msg-avatar-wrap"><div class="msg-avatar-placeholder">${senderPlaceholder}</div></div>`;
            }
            nameHtml = `<div class="msg-sender-name">${senderName}</div>`;

            element.innerHTML = `
                ${avatarHtml}
                <div class="msg-content-wrap">
                    ${nameHtml}
                    <div class="msg-bubble">${escapeHtml(msg.text)}</div>
                </div>
            `;
            container.appendChild(element);
        }

        // Animate only the last message on new additions
        if (isNewMessage && container.lastElementChild) {
            container.lastElementChild.classList.add('new-message-animate');
        }

        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ===== 操作 =====
    function clearCurrentChat() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        if (!confirm(`清空与"${contact.name}"的所有对话？`)) return;
        contact.messages = [];
        renderChat();
        renderSidebar();
    }

    function deleteLastMsg() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact || contact.messages.length === 0) return;
        contact.messages.pop();
        renderChat();
        renderSidebar();
    }

    function exportScreenshot() {
        alert('提示：请使用浏览器截图工具或系统截图功能对聊天区域进行截图。\n\n推荐：\n• Windows: Win+Shift+S\n• Mac: Cmd+Shift+4\n• 浏览器插件: GoFullPage 等');
    }

    // ===== 启动 =====
    init();
    // 添加一个默认占位联系人
    (function() {
        const id = ++contactIdCounter;
        contacts.push({ id, name: '未知联系人', avatar: '', unread: false, messages: [] });
        selectContact(id);
    })();
</script>

</body>
</html>
