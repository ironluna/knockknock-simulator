<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0d0d0d;
            --bg-panel: #1a1a1a;
            --bg-chat: #111111;
            --yellow: #f5d735;
            --yellow-dark: #e6c820;
            --blue: #3a7df2;
            --blue-light: #4a8df8;
            --white: #ffffff;
            --gray-light: #aaaaaa;
            --gray-mid: #555555;
            --gray-dark: #2a2a2a;
            --red: #e84040;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--white);
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            width: 880px;
            max-width: 100%;
            background: var(--bg-panel);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .control-panel h2 {
            font-size: 16px;
            color: var(--yellow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 11px;
            color: var(--gray-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="text"],
        .control-group input[type="file"],
        .control-group textarea {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input:focus,
        .control-group textarea:focus {
            border-color: var(--yellow);
        }

        .control-group textarea {
            resize: vertical;
            min-height: 40px;
            font-family: inherit;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-yellow {
            background: var(--yellow);
            color: #000;
        }

        .btn-yellow:hover {
            background: var(--yellow-dark);
        }

        .btn-blue {
            background: var(--blue);
            color: #fff;
        }

        .btn-blue:hover {
            background: var(--blue-light);
        }

        .btn-red {
            background: var(--red);
            color: #fff;
        }

        .btn-red:hover {
            background: #d03030;
        }

        .btn-gray {
            background: var(--gray-dark);
            color: var(--gray-light);
            border: 1px solid var(--gray-mid);
        }

        .btn-gray:hover {
            background: var(--gray-mid);
            color: var(--white);
        }

        .sender-toggle {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .sender-toggle button {
            padding: 8px 16px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--gray-dark);
            color: var(--gray-light);
        }

        .sender-toggle button.active-other {
            background: #ffffff;
            color: #000000;
        }

        .sender-toggle button.active-me {
            background: var(--blue);
            color: #fff;
        }

        /* ===== 主容器 ===== */
        .app-container {
            width: 880px;
            max-width: 100%;
            height: 620px;
            background: var(--bg-dark);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        .app-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                135deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.015) 20px,
                rgba(255,255,255,0.015) 21px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 顶部栏 ===== */
        .top-bar {
            height: 52px;
            background: var(--bg-panel);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
        }

        .top-bar-logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--yellow);
            letter-spacing: -0.5px;
        }

        .top-bar-logo span {
            color: var(--gray-light);
            font-weight: 400;
            font-size: 12px;
            margin-left: 8px;
        }

        /* ===== 主体区域 ===== */
        .main-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ===== 左侧联系人列表 ===== */
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 14px;
            color: var(--gray-light);
        }

        .sidebar-search {
            margin: 0 12px 12px;
            position: relative;
        }

        .sidebar-search input {
            width: 100%;
            background: var(--gray-dark);
            border: 1px solid transparent;
            color: var(--white);
            padding: 8px 12px 8px 32px;
            border-radius: 10px;
            font-size: 12px;
            outline: none;
        }

        .sidebar-search input:focus {
            border-color: var(--gray-mid);
        }

        .sidebar-search::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }

        .contact-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .contact-item.active {
            background: rgba(245, 215, 53, 0.1);
            border: 1px solid rgba(245, 215, 53, 0.2);
        }

        .contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .contact-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 2px;
        }

        .contact-preview {
            font-size: 11px;
            color: var(--gray-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: 10px;
            color: var(--gray-mid);
        }

        /* ===== 右侧聊天区 ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }

        .chat-header {
            height: 56px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(26,26,26,0.8);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            overflow: hidden;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-header-name {
            font-size: 14px;
            font-weight: 700;
        }

        .chat-header-status {
            font-size: 11px;
            color: #4ade80;
        }

        .chat-header-actions {
            display: flex;
            gap: 12px;
        }

        .chat-header-actions button {
            background: none;
            border: none;
            color: var(--gray-light);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .chat-header-actions button:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        /* ===== 消息列表 ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            max-width: 75%;
            align-items: flex-end;
        }

        .message-row.other {
            align-self: flex-start;
        }

        .message-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-row.me .msg-content {
            align-items: flex-end;
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        /* ===== 关键修正：对方消息 - 白色背景、黑色加粗文字 ===== */
        .message-row.other .msg-bubble {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            border-bottom-left-radius: 6px;
        }

        /* ===== 关键修正：我的消息 - 蓝色背景、白色加粗文字 ===== */
        .message-row.me .msg-bubble {
            background: var(--blue);
            color: #ffffff;
            font-weight: 700;
            border-bottom-right-radius: 6px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--gray-mid);
            padding: 0 8px;
        }

        /* 时间分隔线 */
        .time-divider {
            text-align: center;
            font-size: 11px;
            color: var(--gray-mid);
            padding: 8px 0;
            align-self: center;
        }

        /* ===== 底部输入栏 ===== */
        .chat-input-bar {
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(26,26,26,0.8);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input-bar input {
            flex: 1;
            background: var(--gray-dark);
            border: 1px solid transparent;
            color: var(--white);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }

        .chat-input-bar input:focus {
            border-color: var(--gray-mid);
        }

        .chat-input-bar button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--yellow);
            color: #000;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-input-bar button:hover {
            background: var(--yellow-dark);
        }

        /* ===== 空聊天提示 ===== */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray-mid);
            gap: 12px;
        }

        .empty-chat .icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .empty-chat p {
            font-size: 14px;
        }

        /* ===== 联系人管理区 ===== */
        .contact-manage-section {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .contact-manage-section .btn {
            width: 100%;
            padding: 10px;
            font-size: 12px;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-panel);
            border-radius: 16px;
            padding: 24px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h3 {
            font-size: 16px;
            color: var(--yellow);
            margin-bottom: 16px;
        }

        .modal .control-group {
            margin-bottom: 12px;
            width: 100%;
        }

        .modal .control-group input,
        .modal .control-group textarea {
            width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .avatar-preview {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 消息右键菜单 */
        .context-menu {
            display: none;
            position: fixed;
            background: var(--bg-panel);
            border: 1px solid var(--gray-mid);
            border-radius: 10px;
            padding: 4px;
            z-index: 200;
            min-width: 120px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .context-menu.show {
            display: block;
        }

        .context-menu button {
            display: block;
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: none;
            color: var(--white);
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
        }

        .context-menu button:hover {
            background: rgba(255,255,255,0.1);
        }

        .context-menu button.danger {
            color: var(--red);
        }

        /* 图片消息 */
        .msg-bubble img.chat-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-mid);
            border-radius: 2px;
        }

        /* 导出按钮区域 */
        .export-area {
            width: 880px;
            max-width: 100%;
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* 提示文字 */
        .guide-text {
            font-size: 11px;
            color: var(--gray-mid);
            padding: 4px 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- ===== 控制面板 ===== -->
<div class="control-panel">
    <h2>🎮 聊天模拟器 — 控制台</h2>
    <div class="control-row">
        <div class="control-group">
            <label>发送者</label>
            <div class="sender-toggle" id="senderToggle">
                <button id="btnOther" onclick="setSender('other')" class="active-other">对方</button>
                <button id="btnMe" onclick="setSender('me')">我</button>
            </div>
        </div>
        <div class="control-group" style="flex:1">
            <label>消息内容</label>
            <textarea id="msgInput" placeholder="输入消息内容..." rows="1"></textarea>
        </div>
        <div class="control-group">
            <label>图片消息</label>
            <input type="file" id="imgInput" accept="image/*" style="font-size:11px;padding:5px 8px;">
        </div>
        <button class="btn btn-yellow" onclick="sendMessage()">发送消息</button>
    </div>
    <div class="control-row">
        <div class="control-group">
            <label>插入时间分隔</label>
            <input type="text" id="timeInput" placeholder="如: 下午 3:42" style="width:140px;">
        </div>
        <button class="btn btn-gray" onclick="addTimeDivider()">插入时间</button>
        <div style="flex:1"></div>
        <button class="btn btn-gray" onclick="undoLast()">↩ 撤回</button>
        <button class="btn btn-red" onclick="clearChat()">🗑 清空对话</button>
    </div>
</div>

<!-- ===== 主聊天界面 ===== -->
<div class="app-container" id="appContainer">
    <!-- 顶部 -->
    <div class="top-bar">
        <div class="top-bar-logo">
            Knock Knock
            <span>聊天模拟器</span>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main-body">
        <!-- 左侧联系人 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>消息</h3>
            </div>
            <div class="sidebar-search">
                <input type="text" placeholder="搜索联系人...">
            </div>
            <div class="contact-list" id="contactList">
                <!-- 默认占位联系人 -->
            </div>
            <div class="contact-manage-section">
                <button class="btn btn-yellow" onclick="showAddContact()">+ 新建联系人</button>
            </div>
        </div>

        <!-- 右侧聊天区 -->
        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">
                <div class="icon">💬</div>
                <p>选择一个联系人开始聊天</p>
                <p class="guide-text">或点击左下角「新建联系人」创建对话</p>
            </div>
        </div>
    </div>
</div>

<!-- 导出区域 -->
<div class="export-area">
    <button class="btn btn-gray" onclick="exportAsImage()">📷 截图保存</button>
    <button class="btn btn-gray" onclick="exportJSON()">💾 导出数据</button>
    <button class="btn btn-gray" onclick="importJSON()">📂 导入数据</button>
</div>

<!-- ===== 新建联系人模态框 ===== -->
<div class="modal-overlay" id="addContactModal">
    <div class="modal">
        <h3>✨ 新建联系人</h3>
        <div class="avatar-preview" id="newAvatarPreview">❓</div>
        <div class="control-group">
            <label>头像图片</label>
            <input type="file" id="newAvatarInput" accept="image/*" style="font-size:11px;padding:5px 8px;">
        </div>
        <div class="control-group">
            <label>联系人名称</label>
            <input type="text" id="newContactName" placeholder="输入名称...">
        </div>
        <div class="control-group">
            <label>头像 Emoji（无图片时使用）</label>
            <input type="text" id="newContactEmoji" placeholder="如: 😀" maxlength="4">
        </div>
        <div class="modal-actions">
            <button class="btn btn-gray" onclick="closeAddContact()">取消</button>
            <button class="btn btn-yellow" onclick="addContact()">创建</button>
        </div>
    </div>
</div>

<!-- ===== 编辑联系人模态框 ===== -->
<div class="modal-overlay" id="editContactModal">
    <div class="modal">
        <h3>✏️ 编辑联系人</h3>
        <div class="avatar-preview" id="editAvatarPreview">❓</div>
        <div class="control-group">
            <label>头像图片</label>
            <input type="file" id="editAvatarInput" accept="image/*" style="font-size:11px;padding:5px 8px;">
        </div>
        <div class="control-group">
            <label>联系人名称</label>
            <input type="text" id="editContactName" placeholder="输入名称...">
        </div>
        <div class="control-group">
            <label>头像 Emoji</label>
            <input type="text" id="editContactEmoji" placeholder="如: 😀" maxlength="4">
        </div>
        <div class="control-group">
            <label>"我"的头像 Emoji</label>
            <input type="text" id="editMyEmoji" placeholder="如: 🐱" maxlength="4">
        </div>
        <div class="control-group">
            <label>"我"的头像图片</label>
            <input type="file" id="editMyAvatarInput" accept="image/*" style="font-size:11px;padding:5px 8px;">
        </div>
        <div class="modal-actions">
            <button class="btn btn-red" onclick="deleteContact()">删除联系人</button>
            <button class="btn btn-gray" onclick="closeEditContact()">取消</button>
            <button class="btn btn-yellow" onclick="saveEditContact()">保存</button>
        </div>
    </div>
</div>

<!-- 右键菜单 -->
<div class="context-menu" id="contextMenu">
    <button onclick="editMessage()">✏️ 编辑</button>
    <button class="danger" onclick="deleteMessage()">🗑 删除</button>
</div>

<!-- 隐藏的文件导入 -->
<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
    // ===== 数据 =====
    let contacts = [
        {
            id: 'default',
            name: '未知联系人',
            emoji: '❓',
            avatar: null,
            myEmoji: '🙂',
            myAvatar: null,
            messages: [
                { type: 'time', text: '下午 3:42' },
                { type: 'other', text: '这是一条来自对方的示例消息' },
                { type: 'me', text: '这是一条来自"我"的示例消息' },
                { type: 'other', text: '右键消息可以编辑或删除哦 👆' },
            ]
        }
    ];

    let currentContactId = null;
    let currentSender = 'other';
    let contextMsgIndex = -1;

    // ===== 初始化 =====
    function init() {
        renderContacts();
        selectContact('default');
    }

    // ===== 渲染联系人列表 =====
    function renderContacts() {
        const list = document.getElementById('contactList');
        list.innerHTML = '';
        contacts.forEach(c => {
            const item = document.createElement('div');
            item.className = 'contact-item' + (c.id === currentContactId ? ' active' : '');
            const lastMsg = [...c.messages].reverse().find(m => m.type !== 'time');
            const preview = lastMsg ? (lastMsg.text || '📷 图片') : '暂无消息';
            item.innerHTML = `
                <div class="contact-avatar">
                    ${c.avatar ? `<img src="${c.avatar}">` : c.emoji}
                </div>
                <div class="contact-info">
                    <div class="contact-name">${c.name}</div>
                    <div class="contact-preview">${preview}</div>
                </div>
            `;
            item.onclick = () => selectContact(c.id);
            item.oncontextmenu = (e) => {
                e.preventDefault();
                currentContactId = c.id;
                showEditContact(c);
            };
            list.appendChild(item);
        });
    }

    // ===== 选择联系人 =====
    function selectContact(id) {
        currentContactId = id;
        renderContacts();
        renderChat();
    }

    // ===== 渲染聊天 =====
    function renderChat() {
        const area = document.getElementById('chatArea');
        const contact = contacts.find(c => c.id === currentContactId);

        if (!contact) {
            area.innerHTML = `
                <div class="empty-chat">
                    <div class="icon">💬</div>
                    <p>选择一个联系人开始聊天</p>
                </div>`;
            return;
        }

        let html = `
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-avatar">
                        ${contact.avatar ? `<img src="${contact.avatar}">` : contact.emoji}
                    </div>
                    <div>
                        <div class="chat-header-name">${contact.name}</div>
                        <div class="chat-header-status">在线</div>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button onclick="showEditContact()" title="编辑联系人">⚙️</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
        `;

        contact.messages.forEach((msg, i) => {
            if (msg.type === 'time') {
                html += `<div class="time-divider">${msg.text}</div>`;
            } else {
                const isMe = msg.type === 'me';
                const avatarContent = isMe
                    ? (contact.myAvatar ? `<img src="${contact.myAvatar}">` : contact.myEmoji)
                    : (contact.avatar ? `<img src="${contact.avatar}">` : contact.emoji);

                let bubbleContent = '';
                if (msg.image) {
                    bubbleContent = `<img class="chat-img" src="${msg.image}" onclick="window.open(this.src)">`;
                }
                if (msg.text) {
                    bubbleContent += msg.text;
                }

                html += `
                    <div class="message-row ${msg.type}" oncontextmenu="showContextMenu(event, ${i})">
                        <div class="msg-avatar">${avatarContent}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${bubbleContent}</div>
                        </div>
                    </div>
                `;
            }
        });

        html += `</div>
            <div class="chat-input-bar">
                <input type="text" placeholder="输入消息..." onkeypress="if(event.key==='Enter'){quickSend(this)}">
                <button onclick="quickSend(this.previousElementSibling)">▶</button>
            </div>
        `;

        area.innerHTML = html;

        // 滚动到底部
        requestAnimationFrame(() => {
            const msgs = document.getElementById('chatMessages');
            if (msgs) msgs.scrollTop = msgs.scrollHeight;
        });
    }

    // ===== 发送消息（控制面板） =====
    function sendMessage() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return alert('请先选择一个联系人！');

        const text = document.getElementById('msgInput').value.trim();
        const imgFile = document.getElementById('imgInput').files[0];

        if (!text && !imgFile) return;

        if (imgFile) {
            const reader = new FileReader();
            reader.onload = (e) => {
                contact.messages.push({
                    type: currentSender,
                    text: text,
                    image: e.target.result
                });
                renderChat();
                renderContacts();
            };
            reader.readAsDataURL(imgFile);
        } else {
            contact.messages.push({
                type: currentSender,
                text: text
            });
            renderChat();
            renderContacts();
        }

        document.getElementById('msgInput').value = '';
        document.getElementById('imgInput').value = '';
    }

    // ===== 快捷发送（底部输入栏） =====
    function quickSend(input) {
        const text = input.value.trim();
        if (!text) return;
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;

        contact.messages.push({ type: currentSender, text: text });
        input.value = '';
        renderChat();
        renderContacts();
    }

    // ===== 发送者切换 =====
    function setSender(s) {
        currentSender = s;
        const btnO = document.getElementById('btnOther');
        const btnM = document.getElementById('btnMe');
        btnO.className = s === 'other' ? 'active-other' : '';
        btnM.className = s === 'me' ? 'active-me' : '';
    }

    // ===== 插入时间分隔 =====
    function addTimeDivider() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return alert('请先选择一个联系人！');
        const t = document.getElementById('timeInput').value.trim();
        if (!t) return;
        contact.messages.push({ type: 'time', text: t });
        document.getElementById('timeInput').value = '';
        renderChat();
    }

    // ===== 撤回最后一条 =====
    function undoLast() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact || contact.messages.length === 0) return;
        contact.messages.pop();
        renderChat();
        renderContacts();
    }

    // ===== 清空对话 =====
    function clearChat() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        if (!confirm('确定要清空所有消息吗？')) return;
        contact.messages = [];
        renderChat();
        renderContacts();
    }

    // ===== 右键菜单 =====
    function showContextMenu(e, index) {
        e.preventDefault();
        contextMsgIndex = index;
        const menu = document.getElementById('contextMenu');
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
        menu.classList.add('show');
    }

    document.addEventListener('click', () => {
        document.getElementById('contextMenu').classList.remove('show');
    });

    function editMessage() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        const msg = contact.messages[contextMsgIndex];
        if (!msg || msg.type === 'time') return;
        const newText = prompt('编辑消息内容:', msg.text);
        if (newText !== null) {
            msg.text = newText;
            renderChat();
            renderContacts();
        }
    }

    function deleteMessage() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        contact.messages.splice(contextMsgIndex, 1);
        renderChat();
        renderContacts();
    }

    // ===== 新建联系人 =====
    function showAddContact() {
        document.getElementById('addContactModal').classList.add('show');
        document.getElementById('newContactName').value = '';
        document.getElementById('newContactEmoji').value = '';
        document.getElementById('newAvatarInput').value = '';
        document.getElementById('newAvatarPreview').innerHTML = '❓';
    }

    function closeAddContact() {
        document.getElementById('addContactModal').classList.remove('show');
    }

    document.getElementById('newAvatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('newAvatarPreview').innerHTML = `<img src="${ev.target.result}">`;
            };
            reader.readAsDataURL(file);
        }
    });

    function addContact() {
        const name = document.getElementById('newContactName').value.trim();
        if (!name) return alert('请输入联系人名称！');
        const emoji = document.getElementById('newContactEmoji').value.trim() || '😀';
        const file = document.getElementById('newAvatarInput').files[0];

        const id = 'contact_' + Date.now();

        const finish = (avatarData) => {
            contacts.push({
                id: id,
                name: name,
                emoji: emoji,
                avatar: avatarData,
                myEmoji: '🙂',
                myAvatar: null,
                messages: []
            });
            closeAddContact();
            renderContacts();
            selectContact(id);
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => finish(e.target.result);
            reader.readAsDataURL(file);
        } else {
            finish(null);
        }
    }

    // ===== 编辑联系人 =====
    function showEditContact(c) {
        if (!c) c = contacts.find(co => co.id === currentContactId);
        if (!c) return;
        currentContactId = c.id;

        document.getElementById('editContactName').value = c.name;
        document.getElementById('editContactEmoji').value = c.emoji;
        document.getElementById('editMyEmoji').value = c.myEmoji || '🙂';
        document.getElementById('editAvatarPreview').innerHTML = c.avatar ? `<img src="${c.avatar}">` : c.emoji;
        document.getElementById('editAvatarInput').value = '';
        document.getElementById('editMyAvatarInput').value = '';
        document.getElementById('editContactModal').classList.add('show');
    }

    function closeEditContact() {
        document.getElementById('editContactModal').classList.remove('show');
    }

    document.getElementById('editAvatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('editAvatarPreview').innerHTML = `<img src="${ev.target.result}">`;
            };
            reader.readAsDataURL(file);
        }
    });

    function saveEditContact() {
        const contact = contacts.find(c => c.id === currentContactId);
        if (!contact) return;
        contact.name = document.getElementById('editContactName').value.trim() || contact.name;
        contact.emoji = document.getElementById('editContactEmoji').value.trim() || contact.emoji;
        contact.myEmoji = document.getElementById('editMyEmoji').value.trim() || '🙂';

        const avatarFile = document.getElementById('editAvatarInput').files[0];
        const myAvatarFile = document.getElementById('editMyAvatarInput').files[0];

        let tasks = 0;
        let done = 0;

        const tryFinish = () => {
            done++;
            if (done >= tasks) {
                closeEditContact();
                renderContacts();
                renderChat();
            }
        };

        if (avatarFile) tasks++;
        if (myAvatarFile) tasks++;

        if (tasks === 0) {
            closeEditContact();
            renderContacts();
            renderChat();
            return;
        }

        if (avatarFile) {
            const r = new FileReader();
            r.onload = (e) => { contact.avatar = e.target.result; tryFinish(); };
            r.readAsDataURL(avatarFile);
        }

        if (myAvatarFile) {
            const r = new FileReader();
            r.onload = (e) => { contact.myAvatar = e.target.result; tryFinish(); };
            r.readAsDataURL(myAvatarFile);
        }
    }

    function deleteContact() {
        if (!confirm('确定要删除该联系人及所有消息吗？')) return;
        contacts = contacts.filter(c => c.id !== currentContactId);
        currentContactId = contacts.length > 0 ? contacts[0].id : null;
        closeEditContact();
        renderContacts();
        if (currentContactId) {
            selectContact(currentContactId);
        } else {
            document.getElementById('chatArea').innerHTML = `
                <div class="empty-chat">
                    <div class="icon">💬</div>
                    <p>选择一个联系人开始聊天</p>
                </div>`;
        }
    }

    // ===== 导出截图 =====
    function exportAsImage() {
        alert('💡 提示：请使用浏览器截图插件或系统截图工具对聊天区域进行截图保存。\n\n推荐：按 F12 打开开发者工具，用元素选择器选中 .app-container，右键 → Capture node screenshot');
    }

    // ===== 导出 JSON =====
    function exportJSON() {
        const data = JSON.stringify(contacts, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'chat-data.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ===== 导入 JSON =====
    function importJSON() {
        document.getElementById('importInput').click();
    }

    function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if (Array.isArray(data)) {
                    contacts = data;
                    currentContactId = contacts.length > 0 ? contacts[0].id : null;
                    renderContacts();
                    if (currentContactId) selectContact(currentContactId);
                    alert('导入成功！');
                }
            } catch (err) {
                alert('导入失败：文件格式不正确');
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    // ===== 启动 =====
    init();
</script>

</body>
</html>
